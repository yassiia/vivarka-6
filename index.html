      var weekMeals = lastDaysMeals(8);
      var latestSleep = sleeps.length ? sleeps.slice().sort(byDateDesc)[0] : null;
      var todayActs = activities.filter(function(item) { return item.date === today; });
      var weight = profile && profile.poids ? Number(profile.poids) : null;
      var goalWeight = profile && profile.objectif_poids ? Number(profile.objectif_poids) : null;
      var nutritionScore = todayMeals.length ? Math.round(avg(todayMeals.map(function(x) { return Number(x.score) || 0; }).filter(Boolean))) : Math.round(avg(weekMeals.map(function(x) { return Number(x.score) || 0; }).filter(Boolean)) || 0);
      var sleepScore = latestSleep ? (latestSleep.score || sleepScoreFromDuration(latestSleep.duree_min || 0)) : 0;
      var actScore = todayActs.length ? 72 : activities.length ? 64 : 30;
      var globalScore = calcVivarkaPhotoScore(todayMeals, latestSleep, todayActs);
      var calories = sum(todayMeals, 'calories');
      var proteins = sum(todayMeals, 'proteines');
      var steps = sum(todayActs, 'pas');
      var activeMin = sum(todayActs, 'duree_min');
      var restHr = firstTruthy(todayActs.map(function(item) { return item.fc_repos; })) || null;
      var vitality = calcVitalityScore(globalScore, latestSleep, todayActs);
      var avgKcal = weekMeals.length ? Math.round(sum(weekMeals, 'calories') / uniqueDays(weekMeals, 'date')) : 0;
      var scoreAvg = weekMeals.length ? Math.round(avg(weekMeals.map(function(x) { return Number(x.score) || 0; }).filter(Boolean)) || 0) : 0;
      var proteinDays = proteinGoalDays(8);
      var mealCount = weekMeals.length;
      var activeAlerts = buildPhotoAlerts({
        calories: calories,
        proteins: proteins,
        sleepMin: latestSleep ? latestSleep.duree_min || 0 : 0
      });
      var subtitle = formatPhotoDate(new Date()) + ' · ' + esc((profile && profile.ville) || 'Caen');
      return ''
        + '<section class="home-photo">'
        +   '<div class="home-head"><div><h1 class="home-title">Vue Globale</h1><div class="home-sub">' + subtitle + '</div></div>' + renderPhotoUserChip() + '</div>'
        +   '<section class="overview-grid">' + renderOverviewScorePanel(globalScore, nutritionScore, actScore, sleepScore)
        +     '<div class="kpi-grid">'
        +       renderKpiCard({ key: 'nutrition', icon: '🔥', value: calories ? String(calories) : '—', label: 'Calories', sub: '/' + profileCalorieGoal() + ' ' + (calories >= profileCalorieGoal() * 0.8 ? '✅' : ''), progress: pct(calories, profileCalorieGoal()), color: calories >= profileCalorieGoal() ? '#3D6B5E' : '#B86A60' })
        +       renderKpiCard({ key: 'activity', icon: '👣', value: steps ? String(steps) : '0', label: 'Pas', sub: '/' + activityStepsGoal() + ' ' + (steps >= activityStepsGoal() ? '✅' : ''), progress: pct(steps, activityStepsGoal()), color: '#A8873A' })
        +       renderKpiCard({ key: 'activity', icon: '⏱', value: activeMin ? activeMin + ' min' : '0 min', label: 'Actifs', sub: '/' + activityMinutesGoal() + ' ' + (activeMin >= activityMinutesGoal() ? '✅' : ''), progress: pct(activeMin, activityMinutesGoal()), color: '#3D6B5E' })
        +       renderKpiCard({ key: 'activity', icon: '⚡', value: vitality ? String(vitality) : '—', label: 'Vitalité', sub: '7 jours', progress: vitality, color: '#3D6B5E' })
        +       renderKpiCard({ key: 'activity', icon: '💗', value: restHr ? restHr + ' bpm' : '—', label: 'FC repos', sub: latestTimeForHr() || '—', progress: restHr ? Math.max(20, 100 - Math.min(restHr, 120)) : 24, color: '#B86A60' })
        +       renderKpiCard({ key: 'sleep', icon: '😴', value: latestSleep ? minutesToHours(latestSleep.duree_min || 0) : '—', label: 'Sommeil', sub: sleepBadgeText(latestSleep), progress: sleepScore, color: latestSleep && latestSleep.duree_min < 360 ? '#B86A60' : '#3D6B5E', critical: !!(latestSleep && latestSleep.duree_min < 360) })
        +     '</div>'
        +   '</section>'
        +   '<section class="stats-photo-grid">'
        +     renderPhotoStatCard({ title: 'Score Nutrition', value: scoreAvg || 0, unit: '/100', meta: 'Moy. 8j · ' + mealCount + ' repas', trend: scoreAvg ? '+14 pts vs J1' : 'À construire', trendClass: 'up', targetTab: 'nutrition' })
        +     renderPhotoStatCard({ title: 'Poids', value: weight != null ? round1(weight) : '—', unit: 'kg', meta: 'Objectif ' + (goalWeight != null ? round1(goalWeight) + ' kg' : '—'), trend: weight != null && goalWeight != null ? (weight > goalWeight ? '↓ -' + round1(weight - goalWeight) + ' kg vs objectif' : 'Objectif atteint') : 'Renseigne ton objectif', trendClass: weight != null && goalWeight != null && weight <= goalWeight ? 'up' : 'down', targetTab: 'profile' })
        +     renderPhotoStatCard({ title: 'Protéines', value: proteins ? round1(proteins) : 0, unit: 'g', meta: 'Objectif 130–150g/j', trend: proteinDays + '/8 jours atteint', trendClass: proteinDays >= 4 ? 'up' : 'down', targetTab: 'nutrition' })
        +     renderPhotoStatCard({ title: 'Calories moy.', value: avgKcal || 0, unit: 'kcal', meta: 'Objectif ' + profileCalorieGoal() + ' kcal/j', trend: avgKcal >= profileCalorieGoal() ? 'Dans la cible' : '↓ légèrement sous', trendClass: avgKcal >= profileCalorieGoal() * 0.95 ? 'up' : 'down', targetTab: 'nutrition' })
        +   '</section>'
        +   '<section class="alerts-photo"><div class="alerts-head"><div class="alerts-title">Alertes du jour</div><div class="alerts-badge">' + activeAlerts.length + ' active' + (activeAlerts.length > 1 ? 's' : '') + '</div></div>' + activeAlerts.map(renderPhotoAlert).join('') + '</section>'
        + '</section>';
    }

    function renderProfile() {
      var stats = { meals: meals.length, sleeps: sleeps.length, activities: activities.length };
      var fields = [
        ['prenom', 'Prénom', profile.prenom || '—'],
        ['age', 'Âge', profile.age || '—'],
        ['poids', 'Poids', formatKg(profile.poids)],
        ['objectif_poids', 'Objectif poids', formatKg(profile.objectif_poids)],
        ['objectifs', 'Objectifs', profile.objectifs || '—'],
        ['sport', 'Sport', profile.sport || '—'],
        ['ton_coach', 'Ton coach', profile.ton_coach || 'Bienveillant']
      ];
      return sectionHead('Profil', 'Compte, préférences et statistiques personnelles.')
        + '<section class="card" style="margin-bottom:16px;"><h3 class="card-title">Mon compte</h3><div class="profile-list" style="margin-top:14px;"><div class="profile-line"><div><strong>Email</strong><span>' + esc((session && session.user && session.user.email) || '') + '</span></div><button id="logoutBtn">Se déconnecter</button></div></div></section>'
        + '<section class="card" style="margin-bottom:16px;"><h3 class="card-title">Mon profil</h3><div class="profile-list" style="margin-top:14px;">'
        + fields.map(function(field) { return '<div class="profile-line"><div><strong>' + esc(field[1]) + '</strong><span>' + esc(String(field[2])) + '</span></div><button data-edit="' + field[0] + '">✎</button></div>'; }).join('')
        + '</div></section>'
        + '<section class="quick-grid" style="grid-template-columns:repeat(3,minmax(0,1fr));">' + statBox(stats.meals, 'Repas enregistrés') + statBox(stats.sleeps, 'Nuits enregistrées') + statBox(stats.activities, 'Séances sport') + '</section>'
        + '<button id="resetProfileBtn" class="reset-btn">Réinitialiser le profil</button>';
    }

    function renderActivity() {
      var totalMin = sum(activities, 'duree_min');
      var totalKcal = sum(activities, 'calories');
      var totalSteps = sum(activities, 'pas');
      var restHr = firstTruthy(activities.map(function(item) { return item.fc_repos; })) || null;
      return sectionHead('Activité', 'Stats du jour, progression et historique de tes séances.')
        + '<section class="quick-grid" style="grid-template-columns:repeat(4,minmax(0,1fr)); margin-bottom:16px;">' + statBox(totalSteps || '—', 'Pas') + statBox(totalMin ? totalMin + ' min' : '—', 'Minutes actives') + statBox(totalKcal ? totalKcal + ' kcal' : '—', 'Calories brûlées') + statBox(restHr ? restHr + ' bpm' : '—', 'FC repos') + '</section>'
        + renderActivityForm()
        + (activities.length ? '<div class="meal-list">' + activities.slice().sort(byDateDesc).map(renderActivityEntry).join('') + '</div>' : emptyState('Aucune séance enregistrée', 'Ajoute une séance manuellement ou demande au Coach IA de la journaliser.'));
    }

    function renderOverviewScorePanel(score, nutritionScore, actScore, sleepScore) {
      return '<div class="score-panel"><div class="score-main"><div class="score-stack"><div class="layer">' + mkMiniArc(Math.max(score - 10, 8), 132, 12, '#26d7be', 0.82) + '</div><div class="layer">' + mkMiniArc(Math.max(nutritionScore, 8), 112, 10, '#ffcb22', 0.9) + '</div><div class="layer">' + mkMiniArc(Math.max(actScore, 8), 90, 8, '#2b8bff', 0.9) + '</div><div class="center"><div><div class="score-big">' + (score || '—') + '</div><div class="score-app-label">PHOS</div></div></div></div></div><div class="score-links">' + renderScoreLink('nutrition', 'dot-green', 'Nutrition', nutritionScore) + renderScoreLink('activity', 'dot-gold', 'Activité', actScore) + renderScoreLink('sleep', 'dot-teal', 'Sommeil', (sleepScore || 0) + '%') + '</div></div>';
    }

    function renderScoreLink(tab, dotCls, label, value) {
      return '<a href="#" class="score-link" data-tab-jump="' + tab + '"><em><span class="' + dotCls + '"></span>' + esc(label) + '</em><strong>' + esc(String(value)) + ' ›</strong></a>';
    }

    function renderPhotoUserChip() {
      var initials = initialsOf(profile.prenom || 'VK');
      var meta = [formatKg(profile.poids), profile.taille ? profile.taille + ' cm' : null].filter(Boolean).join(' · ');
      return '<div class="photo-user-chip"><div class="photo-avatar">' + esc(initials) + '</div><div class="photo-user-copy"><strong>' + esc(profile.prenom || 'Profil') + '</strong><span>' + esc(meta || 'Profil VIVARKA') + '</span></div></div>';
    }

    function renderKpiCard(cfg) {
      return '<a href="#" class="kpi-card' + (cfg.critical ? ' sleep-critical' : '') + '" data-tab-jump="' + escAttr(cfg.key) + '"><div class="kpi-ring">' + mkRingIcon(cfg.progress || 0, cfg.color || '#3D6B5E', cfg.icon) + '</div><div class="kpi-value">' + esc(String(cfg.value)) + '</div><div class="kpi-label">' + esc(cfg.label) + '</div><div class="kpi-sub' + (cfg.critical ? ' bad' : (String(cfg.sub).indexOf('✅') !== -1 ? ' good' : (String(cfg.sub).indexOf('Critique') !== -1 ? ' bad' : ' warn'))) + '">' + esc(cfg.sub || '') + '</div></a>';
    }

    function renderPhotoStatCard(cfg) {
      return '<a href="#" class="stats-photo-card" data-tab-jump="' + escAttr(cfg.targetTab || 'home') + '"><div class="stats-kicker">' + esc(cfg.title) + '</div><div class="stats-arrow">→</div><div class="stats-value">' + esc(String(cfg.value)) + (cfg.unit ? '<small>' + esc(cfg.unit) + '</small>' : '') + '</div><div class="stats-meta">' + esc(cfg.meta || '') + '</div><div class="stats-trend ' + escAttr(cfg.trendClass || 'up') + '">' + esc(cfg.trend || '') + '</div></a>';
    }

    function renderPhotoAlert(item) {
      return '<div class="alert-photo-row ' + escAttr(item.cls) + '"><div class="alert-photo-icon">' + esc(item.icon) + '</div><div class="alert-photo-copy"><strong>' + esc(item.title) + '</strong> ' + esc(item.text) + ' <a href="#" data-tab-jump="' + escAttr(item.tab) + '">' + esc(item.linkLabel) + ' ›</a></div></div>';
    }

    function buildPhotoAlerts(ctx) {
      var list = [];
      if (ctx.sleepMin && ctx.sleepMin < 360) list.push({ cls: 'crit', icon: '🫀', title: 'Sommeil critique — ' + minutesToHours(ctx.sleepMin) + '.', text: 'Cortisol élevé, synthèse musculaire réduite. Coucher avant 23h ce soir.', tab: 'sleep', linkLabel: 'Voir sommeil' });
      if (ctx.calories < profileCalorieGoal() && ctx.calories > 0) list.push({ cls: 'warn', icon: '⚠️', title: 'Calories légèrement sous.', text: ctx.calories + ' vs ' + profileCalorieGoal() + '. Ajouter une collation ce soir.', tab: 'nutrition', linkLabel: 'Nutrition' });
      if (ctx.proteins >= 130) list.push({ cls: 'ok', icon: '✅', title: 'Protéines objectif atteint.', text: Math.round(ctx.proteins) + ' g. Récupération musculaire assurée.', tab: 'activity', linkLabel: 'Activité' });
      else if (ctx.proteins > 0) list.push({ cls: 'warn', icon: '💪', title: 'Protéines encore sous la cible.', text: Math.round(ctx.proteins) + ' g pour le moment, vise 130 g.', tab: 'nutrition', linkLabel: 'Nutrition' });
      if (!list.length) list.push({ cls: 'ok', icon: '✅', title: 'Alerte majeure absente.', text: 'Continue à logger tes repas, ton sommeil et ton activité pour garder ce tableau précis.', tab: 'chat', linkLabel: 'Coach IA' });
      return list.slice(0, 3);
    }

    function bindAppEvents() {
      Array.prototype.forEach.call(document.querySelectorAll('[data-tab]'), function(btn) {
        btn.onclick = function() {
          currentTab = btn.getAttribute('data-tab');
          renderApp();
        };
      });
      Array.prototype.forEach.call(document.querySelectorAll('[data-tab-jump]'), function(btn) {
        btn.onclick = function(e) {
          e.preventDefault();
          currentTab = btn.getAttribute('data-tab-jump');
          renderApp();
        };
      });
      var installBtn = document.getElementById('installBtn');
      if (installBtn) installBtn.onclick = installApp;
      bindTabEvents();
    }

    function calcVivarkaPhotoScore(dayMeals, sleepLast, actsToday) {
      var nutritionScore = dayMeals.length ? Math.round(avg(dayMeals.map(function(item) { return Number(item.score) || 0; }).filter(Boolean)) || 0) : 0;
      var sleepScore = sleepLast ? (sleepLast.score || sleepScoreFromDuration(sleepLast.duree_min || 0)) : 0;
      var actScore = actsToday.length ? 75 : 50;
      return Math.round(nutritionScore * 0.5 + sleepScore * 0.3 + actScore * 0.2);
    }

    function mkMiniArc(score, size, stroke, color, opacity) {
      var r = (size - stroke) / 2;
      var circ = 2 * Math.PI * r;
      var arc = Math.max(8, (Math.max(0, Math.min(100, score)) / 100) * circ);
      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" style="transform:rotate(-90deg)"><circle cx="' + (size / 2) + '" cy="' + (size / 2) + '" r="' + r + '" fill="none" stroke="rgba(61,107,94,.08)" stroke-width="' + stroke + '"></circle><circle cx="' + (size / 2) + '" cy="' + (size / 2) + '" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="' + stroke + '" stroke-linecap="round" stroke-opacity="' + (opacity || 1) + '" stroke-dasharray="' + arc + ' ' + circ + '"></circle></svg>';
    }

    function mkRingIcon(score, color, icon) {
      var size = 52;
      var stroke = 5;
      var r = (size - stroke) / 2;
      var circ = 2 * Math.PI * r;
      var arc = Math.max(4, (Math.max(0, Math.min(100, score)) / 100) * circ);
      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" style="transform:rotate(-90deg)"><circle cx="' + (size / 2) + '" cy="' + (size / 2) + '" r="' + r + '" fill="none" stroke="rgba(61,107,94,.08)" stroke-width="' + stroke + '"></circle><circle cx="' + (size / 2) + '" cy="' + (size / 2) + '" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="' + stroke + '" stroke-linecap="round" stroke-dasharray="' + arc + ' ' + circ + '"></circle></svg><div class="glyph">' + esc(icon) + '</div>';
    }

    function pct(value, goal) {
      if (!goal) return 0;
      return Math.max(0, Math.min(100, Math.round((Number(value || 0) / goal) * 100)));
    }

    function profileCalorieGoal() { return 2000; }
    function activityStepsGoal() { return 6000; }
    function activityMinutesGoal() { return 30; }

    function calcVitalityScore(globalScore, sleepLast, actsToday) {
      var base = globalScore || 0;
      if (sleepLast && sleepLast.duree_min < 360) base -= 12;
      if (actsToday.length) base += 6;
      return Math.max(0, Math.min(100, base));
    }

    function proteinGoalDays(days) {
      var bucket = {};
      meals.forEach(function(item) {
        if (getLastDays(days).indexOf(item.date) !== -1) bucket[item.date] = (bucket[item.date] || 0) + Number(item.proteines || 0);
      });
      return Object.keys(bucket).filter(function(day) { return bucket[day] >= 130; }).length;
    }

    function formatPhotoDate(d) {
      return new Intl.DateTimeFormat('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' }).format(d);
    }

    function initialsOf(name) {
      return String(name || 'VK').trim().split(/\s+/).slice(0, 2).map(function(part) { return part.charAt(0).toUpperCase(); }).join('');
    }

    function firstTruthy(arr) {
      for (var i = 0; i < arr.length; i++) if (arr[i] || arr[i] === 0) return arr[i];
      return null;
    }

    function sleepBadgeText(item) {
      if (!item) return 'Aucune nuit';
      if ((item.duree_min || 0) < 360) return '⚠️ Critique';
      if ((item.duree_min || 0) < 420) return 'À surveiller';
      return '✅ Stable';
    }

    function latestTimeForHr() {
      var recent = activities.slice().sort(byDateDesc)[0];
      return recent && recent.created_at ? new Intl.DateTimeFormat('fr-FR', { hour: '2-digit', minute: '2-digit' }).format(new Date(recent.created_at)) : '';
    }

    /* ================================================================
       PATCH: DRILL-DOWN NAVIGATION + CHAMP INGRÉDIENTS
       Override des fonctions grâce au hoisting JS
       (dernière déclaration gagne)
       ================================================================ */

    var viewStack = [];
    var activeView = null;
    var activeViewData = null;

    function drill(view, data) {
      viewStack.push({ isTab: !activeView, view: activeView || currentTab, data: activeView ? activeViewData : null });
      activeView = view;
      activeViewData = data;
      renderApp();
      window.scrollTo(0, 0);
    }

    function backView() {
      if (!viewStack.length) {
        activeView = null;
        activeViewData = null;
        renderApp();
        return;
      }
      var prev = viewStack.pop();
      if (prev.isTab) {
        activeView = null;
        activeViewData = null;
        currentTab = prev.view;
      } else {
        activeView = prev.view;
        activeViewData = prev.data;
      }
      renderApp();
      window.scrollTo(0, 0);
    }

    function resetDrill() {
      viewStack = [];
      activeView = null;
      activeViewData = null;
    }

    /* ---------- Dispatcher override ---------- */
    function renderCurrentTab() {
      if (activeView === 'meal_detail') return renderMealDetail(activeViewData);
      if (activeView === 'sleep_detail') return renderSleepDetail(activeViewData);
      if (activeView === 'activity_detail') return renderActivityDetail(activeViewData);
      if (activeView === 'day_detail') return renderDayDetail(activeViewData);
      if (currentTab === 'nutrition') return renderNutrition();
      if (currentTab === 'sleep') return renderSleep();
      if (currentTab === 'activity') return renderActivity();
      if (currentTab === 'chat') return renderChat();
      if (currentTab === 'profile') return renderProfile();
      return renderHome();
    }

    /* ---------- Meal row clickable ---------- */
    function renderMeal(meal, withActions) {
      var showActions = withActions === true;
      var actionsHtml = showActions
        ? '<button class="tiny-btn" data-meal-edit="' + escAttr(meal.id) + '">Modifier</button><button class="tiny-btn warn" data-meal-delete="' + escAttr(meal.id) + '">Supprimer</button>'
        : '';
      return '<div class="meal-item clickable-row" data-meal-drill="' + escAttr(meal.id) + '">'
        +   '<div class="meal-main"><strong>🍽️ ' + esc(meal.description || 'Repas') + '</strong>'
        +     '<span>' + esc(meal.heure || '—') + ' · ' + esc(String(meal.calories || 0)) + ' kcal · ' + esc(String(round1(meal.proteines || 0))) + ' g prot</span></div>'
        +   '<div class="entry-actions">'
        +     '<div class="score-chip" style="background:' + scoreColor(meal.score) + ';">' + esc(String(meal.score || '—')) + '</div>'
        +     actionsHtml
        +     '<span class="chev">›</span>'
        +   '</div>'
        + '</div>';
    }

    /* ---------- Sleep row clickable ---------- */
    function renderSleepEntry(item) {
      return '<div class="meal-item clickable-row" data-sleep-drill="' + escAttr(item.id) + '">'
        +   '<div class="meal-main"><strong>💤 ' + esc(formatDayOnly(item.date)) + '</strong>'
        +     '<span>' + esc(minutesToHours(item.duree_min || 0)) + ' · ' + esc(item.qualite || 'Qualité non précisée') + '</span></div>'
        +   '<div class="entry-actions">'
        +     '<div class="score-chip" style="background:' + scoreColor(item.score) + ';">' + esc(String(item.score || '—')) + '</div>'
        +     '<button class="tiny-btn" data-sleep-edit="' + escAttr(item.id) + '">Modifier</button>'
        +     '<button class="tiny-btn warn" data-sleep-delete="' + escAttr(item.id) + '">Supprimer</button>'
        +     '<span class="chev">›</span>'
        +   '</div>'
        + '</div>';

    /* ---------- Activity row clickable ---------- */
    function renderActivityEntry(item) {
      return '<div class="meal-item clickable-row" data-activity-drill="' + escAttr(item.id) + '">'
        +   '<div class="meal-main"><strong>🏋️ ' + esc(item.type || 'Séance') + '</strong>'
        +     '<span>' + esc(item.date || '—') + ' · ' + esc(String(item.duree_min || 0)) + ' min · ' + esc(String(item.calories || 0)) + ' kcal</span></div>'
        +   '<div class="entry-actions">'
        +     '<button class="tiny-btn" data-activity-edit="' + escAttr(item.id) + '">Modifier</button>'
        +     '<button class="tiny-btn warn" data-activity-delete="' + escAttr(item.id) + '">Supprimer</button>'
        +     '<span class="chev">›</span>'
        +   '</div>'
        + '</div>';

    /* ---------- DETAIL VIEWS ---------- */
    function detailHead(title, sub) {
      return '<section class="detail-head"><button id="drillBack" class="back-btn" type="button">← Retour</button>'
        +     '<div><h1 class="section-title" style="margin:0;">' + esc(title) + '</h1>'
        +     '<div class="section-sub">' + esc(sub || '') + '</div></div></section>';
    }

    function renderMealDetail(id) {
      var meal = meals.find(function(x) { return String(x.id) === String(id); });
      if (!meal) return detailHead('Repas introuvable', '') + emptyState('Ce repas a été supprimé.', 'Reviens à la liste pour voir les autres.');
      var ingredients = (meal.ingredients || '').split(/\r?\n/).filter(function(s) { return s.trim(); });
      var ingRows = ingredients.length
        ? '<div class="card" style="margin-top:14px;"><h3 class="card-title">Ingrédients</h3><div class="ing-list" style="margin-top:10px;">'
          + ingredients.map(function(line) {
              return '<div class="ing-row"><span class="ing-name">' + esc(line.trim()) + '</span></div>';
            }).join('')
          + '</div></div>'
        : '<div class="card" style="margin-top:14px;"><h3 class="card-title">Ingrédients</h3><div class="muted" style="margin-top:8px;">Aucun ingrédient renseigné. Utilise le bouton Modifier pour en ajouter.</div></div>';
      var notes = meal.notes ? '<div class="card" style="margin-top:14px;"><h3 class="card-title">Notes</h3><div style="margin-top:8px; white-space:pre-wrap;">' + esc(meal.notes) + '</div></div>' : '';
      return detailHead(meal.description || 'Repas', formatDayOnly(meal.date) + ' · ' + (meal.heure || '—'))
        + '<section class="quick-grid" style="grid-template-columns:repeat(4,minmax(0,1fr));">'
        +   statBox((meal.calories || 0) + ' kcal', 'Calories')
        +   statBox(round1(meal.proteines || 0) + ' g', 'Protéines')
        +   statBox(round1(meal.glucides || 0) + ' g', 'Glucides')
        +   statBox(round1(meal.graisses || 0) + ' g', 'Graisses')
        + '</section>'
        + '<div class="card" style="margin-top:14px;">'
        +   '<h3 class="card-title">Score nutritionnel</h3>'
        +   '<div style="display:flex;align-items:center;gap:16px;margin-top:10px;">'
        +   scoreRing(meal.score)
        +   '<div><div style="font-size:14px;color:var(--mist);">' + scoreBadge(meal.score) + '</div></div>'
        +   '</div>'
        + '</div>'
        + ingRows
        + notes
        + '<div class="action-row" style="margin-top:16px;">'
        +   '<button class="primary-btn" style="width:auto;margin:0;" data-meal-edit="' + escAttr(meal.id) + '">Modifier ce repas</button>'
        +   '<button class="tiny-btn warn" data-meal-delete="' + escAttr(meal.id) + '">Supprimer</button>'
        + '</div>';
    }

    function renderSleepDetail(id) {
      var item = sleeps.find(function(x) { return String(x.id) === String(id); });
      if (!item) return detailHead('Nuit introuvable', '') + emptyState('Cette nuit a été supprimée.', 'Reviens à la liste pour voir les autres nuits.');
      var h = (item.duree_min || 0) / 60;
      return detailHead(formatDayOnly(item.date), 'Nuit du ' + item.date)
        + '<section class="quick-grid" style="grid-template-columns:repeat(3,minmax(0,1fr));">'
        +   statBox(minutesToHours(item.duree_min || 0), 'Durée')
        +   statBox(item.qualite || '—', 'Qualité ressentie')
        +   statBox((item.score || 0) + '/100', 'Score')
        + '</section>'
        + '<div class="card" style="margin-top:14px;">'
        +   '<h3 class="card-title">Interprétation</h3>'
        +   '<div style="margin-top:8px;">' + esc(h >= 7.5 ? 'Excellente durée de sommeil.' : h >= 6.5 ? 'Durée correcte, vise 7h30 idéalement.' : h >= 5.5 ? 'Sommeil insuffisant, impact sur la récupération.' : 'Sommeil très insuffisant, priorité absolue.') + '</div>'
        + '</div>'
        + '<div class="action-row" style="margin-top:16px;">'
        +   '<button class="primary-btn" style="width:auto;margin:0;" data-sleep-edit="' + escAttr(item.id) + '">Modifier</button>'
        +   '<button class="tiny-btn warn" data-sleep-delete="' + escAttr(item.id) + '">Supprimer</button>'
        + '</div>';
    }

    function renderActivityDetail(id) {
      var item = activities.find(function(x) { return String(x.id) === String(id); });
      if (!item) return detailHead('Séance introuvable', '') + emptyState('Cette séance a été supprimée.', 'Reviens à la liste pour voir les autres séances.');
      return detailHead(item.type || 'Séance', (item.date || '—'))
        + '<section class="quick-grid" style="grid-template-columns:repeat(3,minmax(0,1fr));">'
        +   statBox((item.duree_min || 0) + ' min', 'Durée')
        +   statBox((item.calories || 0) + ' kcal', 'Calories')
        +   statBox(item.pas ? item.pas : '—', 'Pas')
        + '</section>'
        + (item.description ? '<div class="card" style="margin-top:14px;"><h3 class="card-title">Description</h3><div style="margin-top:8px;white-space:pre-wrap;">' + esc(item.description) + '</div></div>' : '')
        + '<div class="action-row" style="margin-top:16px;">'
        +   '<button class="primary-btn" style="width:auto;margin:0;" data-activity-edit="' + escAttr(item.id) + '">Modifier</button>'
        +   '<button class="tiny-btn warn" data-activity-delete="' + escAttr(item.id) + '">Supprimer</button>'
        + '</div>';
    }

    function renderDayDetail(date) {
      var dayMeals = mealsForDay(date);
      var totalCal = sum(dayMeals, 'calories');
      var totalProt = round1(sum(dayMeals, 'proteines'));
      var dayScore = dayMeals.length ? Math.round(avg(dayMeals.map(function(x) { return Number(x.score) || 0; }).filter(Boolean)) || 0) : 0;
      return detailHead(formatDayOnly(date), date + ' · ' + dayMeals.length + ' repas')
        + '<section class="quick-grid" style="grid-template-columns:repeat(3,minmax(0,1fr));">'
        +   statBox(totalCal + ' kcal', 'Calories totales')
        +   statBox(totalProt + ' g', 'Protéines')
        +   statBox(dayScore + '/100', 'Score moyen')
        + '</section>'
        + (dayMeals.length
          ? '<div class="meal-list" style="margin-top:14px;">' + dayMeals.map(function(m) { return renderMeal(m, true); }).join('') + '</div>'
          : emptyState('Aucun repas ce jour', 'Ajoute-en depuis l\'onglet Nutrition.'));
    }

    /* ---------- Form: ajouter champ ingrédients ---------- */
    function emptyMealDraft() {
      return { description: '', heure: '', date: todayISO(), calories: '', proteines: '', graisses: '', glucides: '', score: '', ingredients: '', notes: '' };
    }

    function renderMealForm() {
      return '<section class="card manual-card">'
        + '<h3 class="card-title">' + (editingMealId ? 'Modifier un repas' : 'Ajouter un repas manuellement') + '</h3>'
        + '<div class="form-grid" style="margin-top:14px;">'
        + inputField('mealDescription', 'text', 'Description du repas', mealDraft.description)
        + inputField('mealHeure', 'time', 'Heure', mealDraft.heure)
        + inputField('mealDate', 'date', 'Date', mealDraft.date)
        + inputField('mealCalories', 'number', 'Calories', mealDraft.calories)
        + inputField('mealProteines', 'number', 'Protéines (g)', mealDraft.proteines)
        + inputField('mealGraisses', 'number', 'Graisses (g)', mealDraft.graisses)
        + inputField('mealGlucides', 'number', 'Glucides (g)', mealDraft.glucides)
        + inputField('mealScore', 'number', 'Score /100', mealDraft.score)
        + '<textarea id="mealIngredients" class="light-area span-2" placeholder="Ingrédients (un par ligne) — ex:\n100g riz complet\n150g poulet\n1 c. huile olive">' + esc(mealDraft.ingredients || '') + '</textarea>'
        + '<textarea id="mealNotes" class="light-area span-2" placeholder="Notes, ressenti, contexte...">' + esc(mealDraft.notes) + '</textarea>'
        + '</div>'
        + '<div class="action-row" style="margin-top:14px;"><button id="mealSaveBtn" class="primary-btn" style="width:auto; margin:0;">' + (editingMealId ? 'Enregistrer les modifications' : 'Ajouter ce repas') + '</button><button id="mealCancelBtn" class="ghost-btn" style="color:var(--ink); border-color:var(--border);">' + (editingMealId ? 'Annuler la modification' : 'Vider le formulaire') + '</button></div>'
        + '<div class="manual-note">Liste les ingrédients ligne par ligne pour les retrouver dans le détail du repas.</div>'
        + '</section>';
    }

    async function saveMealManual() {
      var payload = {
        auth_user_id: session.user.id,
        description: valueOf('mealDescription'),
        heure: valueOf('mealHeure'),
        date: valueOf('mealDate') || todayISO(),
        calories: numberOrNull(valueOf('mealCalories')),
        proteines: numberOrNull(valueOf('mealProteines')),
        graisses: numberOrNull(valueOf('mealGraisses')),
        glucides: numberOrNull(valueOf('mealGlucides')),
        score: intOrNull(valueOf('mealScore')),
        ingredients: valueOf('mealIngredients'),
        notes: valueOf('mealNotes')
      };
      if (!payload.description) return alert('Ajoute au moins une description de repas.');
      try {
        if (editingMealId) {
          await db('meals?id=eq.' + editingMealId + '&auth_user_id=eq.' + encodeURIComponent(session.user.id), 'PATCH', payload);
        } else {
          await db('meals', 'POST', payload);
        }
        await loadAllData();
        resetMealDraft(false);
        resetDrill();
        renderApp();
      } catch (e) {
        alert(cleanError(e));
      }
    }

    function startEditMeal(id) {
      var item = meals.find(function(x) { return String(x.id) === String(id); });
      if (!item) return;
      editingMealId = id;
      mealDraft = {
        description: item.description || '',
        heure: item.heure || '',
        date: item.date || todayISO(),
        calories: item.calories == null ? '' : item.calories,
        proteines: item.proteines == null ? '' : item.proteines,
        graisses: item.graisses == null ? '' : item.graisses,
        glucides: item.glucides == null ? '' : item.glucides,
        score: item.score == null ? '' : item.score,
        ingredients: item.ingredients || '',
        notes: item.notes || ''
      };
      resetDrill();
      currentTab = 'nutrition';
      renderApp();
    }

    function normalizeMealPayload(data, partial) {
      var payload = partial ? {} : {
        auth_user_id: session.user.id,
        date: todayISO()
      };
      if (!partial) payload.auth_user_id = session.user.id;
      if (data.description != null) payload.description = String(data.description || '').trim();
      if (data.date != null && isIsoDate(String(data.date))) payload.date = String(data.date);
      if (data.heure != null) payload.heure = String(data.heure || '').slice(0, 5);
      if (data.calories != null) payload.calories = intOrNull(String(data.calories));
      if (data.proteines != null) payload.proteines = numberOrNull(String(data.proteines));
      if (data.graisses != null) payload.graisses = numberOrNull(String(data.graisses));
      if (data.glucides != null) payload.glucides = numberOrNull(String(data.glucides));
      if (data.score != null) payload.score = intOrNull(String(data.score));
      if (data.ingredients != null) payload.ingredients = String(data.ingredients || '');
      if (data.notes != null) payload.notes = String(data.notes || '');
      return payload;
    }

    /* ---------- Bind drill events + tab reset ---------- */
    function bindAppEvents() {
      Array.prototype.forEach.call(document.querySelectorAll('[data-tab]'), function(btn) {
        btn.onclick = function() {
          resetDrill();
          currentTab = btn.getAttribute('data-tab');
          renderApp();
        };
      });
      Array.prototype.forEach.call(document.querySelectorAll('[data-tab-jump]'), function(btn) {
        btn.onclick = function(e) {
          e.preventDefault();
          resetDrill();
          currentTab = btn.getAttribute('data-tab-jump');
          renderApp();
        };
      });
      Array.prototype.forEach.call(document.querySelectorAll('[data-meal-drill]'), function(row) {
        row.onclick = function(e) {
          if (e.target.closest('button, .tiny-btn, .score-chip, [data-meal-edit], [data-meal-delete]')) return;
          drill('meal_detail', row.getAttribute('data-meal-drill'));
        };
      });
      Array.prototype.forEach.call(document.querySelectorAll('[data-sleep-drill]'), function(row) {
        row.onclick = function(e) {
          if (e.target.closest('button, .tiny-btn, .score-chip, [data-sleep-edit], [data-sleep-delete]')) return;
          drill('sleep_detail', row.getAttribute('data-sleep-drill'));
        };
      });
      Array.prototype.forEach.call(document.querySelectorAll('[data-activity-drill]'), function(row) {
        row.onclick = function(e) {
          if (e.target.closest('button, .tiny-btn, [data-activity-edit], [data-activity-delete]')) return;
          drill('activity_detail', row.getAttribute('data-activity-drill'));
        };
      });
      Array.prototype.forEach.call(document.querySelectorAll('[data-day-drill]'), function(row) {
        row.onclick = function(e) {
          e.preventDefault();
          drill('day_detail', row.getAttribute('data-day-drill'));
        };
      });
      var backBtn = document.getElementById('drillBack');
      if (backBtn) backBtn.onclick = backView;
      var installBtn = document.getElementById('installBtn');
      if (installBtn) installBtn.onclick = installApp;
      bindTabEvents();
    }

    /* ---------- CSS additions ---------- */
    (function injectDrillStyles() {
      var css = ''
        + '.clickable-row{cursor:pointer;transition:transform 0.15s, box-shadow 0.15s;}'
        + '.clickable-row:hover{transform:translateX(2px);box-shadow:0 6px 18px rgba(26,32,30,0.06);border-color:rgba(61,107,94,0.22);}'
        + '.chev{color:var(--mist);font-size:18px;margin-left:4px;}'
        + '.detail-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;}'
        + '.back-btn{padding:10px 16px;border-radius:12px;background:#fff;border:1px solid var(--border);color:var(--ink2);font-weight:600;font-size:13px;cursor:pointer;transition:all 0.15s;}'
        + '.back-btn:hover{background:var(--paper);color:var(--sage);border-color:rgba(61,107,94,0.25);}'
        + '.ing-list{display:flex;flex-direction:column;}'
        + '.ing-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--border);}'
        + '.ing-row:last-child{border-bottom:0;}'
        + '.ing-name{font-size:14px;color:var(--ink);}';
      var style = document.createElement('style');
      style.textContent = css;
      document.head.appendChild(style);
    })();

    /* ---------- Nutrition override : formulaire masqué par défaut ---------- */
    var showMealForm = false;

    function renderNutrition() {
      var days = getLastDays(7);
      var blocks = days.map(function(day) {
        var dayMeals = mealsForDay(day);
        if (!dayMeals.length) return '';
        var dayScore = avg(dayMeals.map(function(x) { return Number(x.score) || 0; }).filter(Boolean));
        return '<div class="day-card clickable-row" data-day-drill="' + escAttr(day) + '" style="cursor:pointer;">'
          + '<div class="day-head"><div><strong>' + esc(formatDayOnly(day)) + '</strong><span>' + esc(day) + '</span></div>'
          + '<div class="muted">' + sum(dayMeals, 'calories') + ' kcal · ' + round1(sum(dayMeals, 'proteines')) + ' g prot · ' + (dayScore ? Math.round(dayScore) + '/100' : '—') + ' <span class="chev">›</span></div></div>'
          + '<div class="meal-list">' + dayMeals.map(function(meal) { return renderMeal(meal, true); }).join('') + '</div>'
          + '</div>';
      }).filter(Boolean).join('');
      var formSection = (showMealForm || editingMealId)
        ? renderMealForm()
        : '<button id="addMealBtn" class="primary-btn" style="width:auto;margin-bottom:20px;">+ Ajouter un repas</button>';
      return sectionHead('Nutrition', 'Clique sur un repas ou un jour pour voir les détails.')
        + formSection
        + (blocks || emptyState('Aucun repas enregistré', 'Utilise le bouton ci-dessus ou le Coach IA pour démarrer ton historique nutrition.'));
    }

    /* Override bindMealFormEvents pour gérer le bouton + fermeture */
    function bindMealFormEvents() {
      var addBtn = document.getElementById('addMealBtn');
      if (addBtn) addBtn.onclick = function() { showMealForm = true; renderApp(); };
      var save = document.getElementById('mealSaveBtn');
      var cancel = document.getElementById('mealCancelBtn');
      if (save) save.onclick = saveMealManual;
      if (cancel) cancel.onclick = function() { showMealForm = false; resetMealDraft(); };
      Array.prototype.forEach.call(document.querySelectorAll('[data-meal-edit]'), function(btn) {
        btn.onclick = function() { startEditMeal(btn.getAttribute('data-meal-edit')); };
      });
      Array.prototype.forEach.call(document.querySelectorAll('[data-meal-delete]'), function(btn) {
        btn.onclick = function() { deleteMeal(btn.getAttribute('data-meal-delete')); };
      });
    }

    /* Override saveMealManual pour fermer le formulaire après sauvegarde */
    async function saveMealManual() {
      var payload = {
        auth_user_id: session.user.id,
        description: valueOf('mealDescription'),
        heure: valueOf('mealHeure'),
        date: valueOf('mealDate') || todayISO(),
        calories: numberOrNull(valueOf('mealCalories')),
        proteines: numberOrNull(valueOf('mealProteines')),
        graisses: numberOrNull(valueOf('mealGraisses')),
        glucides: numberOrNull(valueOf('mealGlucides')),
        score: intOrNull(valueOf('mealScore')),
        ingredients: valueOf('mealIngredients') || '',
        notes: valueOf('mealNotes')
      };
      if (!payload.description) return alert('Ajoute au moins une description de repas.');
      try {
        if (editingMealId) {
          await db('meals?id=eq.' + editingMealId + '&auth_user_id=eq.' + encodeURIComponent(session.user.id), 'PATCH', payload);
        } else {
          await db('meals', 'POST', payload);
        }
        await loadAllData();
        showMealForm = false;
        resetMealDraft(false);
        renderApp();
      } catch (e) {
        alert(cleanError(e));
      }
    }

    /* Override startEditMeal pour ouvrir le formulaire automatiquement */
    function startEditMeal(id) {
      var item = (meals || []).find(function(m) { return String(m.id) === String(id); });
      if (!item) return;
      editingMealId = id;
      showMealForm = true;
      mealDraft = {
        description: item.description || '',
        heure: item.heure || '',
        date: item.date || todayISO(),
        calories: item.calories == null ? '' : item.calories,
        proteines: item.proteines == null ? '' : item.proteines,
        graisses: item.graisses == null ? '' : item.graisses,
        glucides: item.glucides == null ? '' : item.glucides,
        score: item.score == null ? '' : item.score,
        ingredients: item.ingredients || '',
        notes: item.notes || ''
      };
      resetDrill();
      currentTab = 'nutrition';
      renderApp();
    }

    /* Reset showMealForm quand on change d'onglet */
    function bindAppEvents() {
      Array.prototype.forEach.call(document.querySelectorAll('[data-tab]'), function(btn) {
        btn.onclick = function() {
          showMealForm = false;
          resetDrill();
          currentTab = btn.getAttribute('data-tab');
          renderApp();
        };
      });
      Array.prototype.forEach.call(document.querySelectorAll('[data-tab-jump]'), function(btn) {
        btn.onclick = function(e) {
          e.preventDefault();
          showMealForm = false;
          resetDrill();
          currentTab = btn.getAttribute('data-tab-jump');
          renderApp();
        };
      });
      Array.prototype.forEach.call(document.querySelectorAll('[data-meal-drill]'), function(row) {
        row.onclick = function(e) {
          if (e.target.closest('button, .tiny-btn, .score-chip, [data-meal-edit], [data-meal-delete]')) return;
          drill('meal_detail', row.getAttribute('data-meal-drill'));
        };
      });
      Array.prototype.forEach.call(document.querySelectorAll('[data-sleep-drill]'), function(row) {
        row.onclick = function(e) {
          if (e.target.closest('button, .tiny-btn, .score-chip, [data-sleep-edit], [data-sleep-delete]')) return;
          drill('sleep_detail', row.getAttribute('data-sleep-drill'));
        };
      });
      Array.prototype.forEach.call(document.querySelectorAll('[data-activity-drill]'), function(row) {
        row.onclick = function(e) {
          if (e.target.closest('button, .tiny-btn, [data-activity-edit], [data-activity-delete]')) return;
          drill('activity_detail', row.getAttribute('data-activity-drill'));
        };
      });
      Array.prototype.forEach.call(document.querySelectorAll('[data-day-drill]'), function(row) {
        row.onclick = function(e) {
          e.preventDefault();
          drill('day_detail', row.getAttribute('data-day-drill'));
        };
      });
      var backBtn = document.getElementById('drillBack');
      if (backBtn) backBtn.onclick = backView;
      var installBtn = document.getElementById('installBtn');
      if (installBtn) installBtn.onclick = installApp;
      bindTabEvents();
    }
  </script>
